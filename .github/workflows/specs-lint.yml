name: Specs Lint

on:
  pull_request:
  push:
    branches: ["main", "session2"]

jobs:
  validate-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm install
      - run: npm run validate:specs
