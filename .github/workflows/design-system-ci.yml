name: Design System CI

on:
  pull_request:
    paths:
      - "prototypes/design-system/**"
      - ".github/workflows/design-system-ci.yml"

jobs:
  design-system-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm install
      - run: npm run build:tokens
      - run: npm run test --workspace prototypes/design-system/packages/components
      - run: npm run build --workspace prototypes/design-system/apps/storybook
