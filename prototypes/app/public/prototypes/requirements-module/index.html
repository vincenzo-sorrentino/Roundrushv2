<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requirements Module Prototype</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
      .shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
      header { padding: 12px 16px; border-bottom: 1px solid #dbe3ef; background: #fff; }
      header strong { display: block; }
      header span { color: #475569; font-size: 14px; }
      iframe { width: 100%; height: calc(100vh - 62px); border: 0; background: #fff; }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <strong>Requirements Module Prototype</strong>
        <span>Embedded preview source for RoundRush linked prototypes.</span>
      </header>
      <iframe src="/requirements/module" title="Requirements module"></iframe>
    </div>
  </body>
</html>
